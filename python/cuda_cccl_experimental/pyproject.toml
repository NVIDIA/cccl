[build-system]
requires = ["scikit-build-core>=0.10", "setuptools_scm", "cython"]
build-backend = "scikit_build_core.build"

[project]
name = "cuda-cccl-experimental"
description = "Experimental CUDA Core Compute Libraries for Python (CUDASTF)"
authors = [{ name = "NVIDIA Corporation" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Environment :: GPU :: NVIDIA CUDA",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: POSIX :: Linux",
]
requires-python = ">=3.10"

dependencies = ["cuda-cccl"]

dynamic = ["version"]
readme = { file = "README.md", content-type = "text/markdown" }

[project.optional-dependencies]
cu12 = ["cuda-cccl[cu12]"]
cu13 = ["cuda-cccl[cu13]"]
test-cu12 = [
  "cuda-cccl-experimental[cu12]",
  "pytest",
  "pytest-xdist",
  "cupy-cuda12x",
]
test-cu13 = [
  "cuda-cccl-experimental[cu13]",
  "pytest",
  "pytest-xdist",
  "cupy-cuda13x",
]

[project.urls]
Homepage = "https://github.com/NVIDIA/cccl"
Repository = "https://github.com/NVIDIA/cccl"
Documentation = "https://nvidia.github.io/cccl"
Issues = "https://github.com/NVIDIA/cccl/issues"

[tool.scikit-build]
minimum-version = "build-system.requires"
build-dir = "build/{wheel_tag}"

[tool.scikit-build.cmake]
version = ">=3.21"
args = []
build-type = "Release"
source-dir = "."

[tool.scikit-build.ninja]
version = ">=1.11"
make-fallback = true

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.setuptools_scm"

[tool.setuptools_scm]
root = "../.."
git_describe_command = ["git", "describe", "--tags", "--match", "v[0-9]*"]

[tool.scikit-build.wheel.packages]
"cuda" = "cuda"

[tool.mypy]
cache_dir = "../../.cache/mypy"
python_version = "3.10"

[[tool.mypy.overrides]]
module = [
  "numba.*",
  "llvmlite.*",
  "cuda.cccl.*",
  "cuda.bindings.*",
  "cuda.core.*",
  "cuda.pathfinder.*",
]
ignore_missing_imports = true
follow_imports = "skip"

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.isort]
known-first-party = ["cuda.stf"]

[tool.pytest.ini_options]
markers = []
