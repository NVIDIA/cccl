[build-system]
# STF builds cccl.c.experimental.stf and cudax through the top-level CCCL
# project, which requires a recent FindCUDAToolkit.
requires = ["scikit-build-core>=0.10", "setuptools_scm", "cython", "cmake>=3.30"]
build-backend = "scikit_build_core.build"

[project]
name = "cuda-stf"
description = "CUDASTF (Sequential Task Flow) bindings for CUDA Python"
authors = [{ name = "NVIDIA Corporation" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Environment :: GPU :: NVIDIA CUDA",
  "License :: OSI Approved :: Apache Software License",
  # CUDASTF ships Linux-only; the native extension is gated off on Windows.
  "Operating System :: POSIX :: Linux",
]
requires-python = ">=3.10"

dependencies = [
  "numpy",
  "cuda-pathfinder>=1.2.3",
  "cuda-core",
  "typing_extensions",
]
dynamic = ["version"]
readme = { file = "README.md", content-type = "text/markdown" }

[project.optional-dependencies]
minimal-cu12 = [
  "cuda-bindings>=12.9.1,<13.0.0",
  "cuda-toolkit[nvrtc,nvjitlink,cudart,nvcc]==12.*",
]
minimal-cu13 = [
  "cuda-bindings>=13.0.0,<14.0.0",
  "cuda-toolkit[nvrtc,nvjitlink,cudart,nvcc,nvvm]==13.*",
]
# sysctk variants: like cu12/cu13 but without cuda-toolkit — the user is
# responsible for providing a compatible CUDA toolkit
minimal-sysctk12 = [
  "cuda-bindings>=12.9.1,<13.0.0",
]
minimal-sysctk13 = [
  "cuda-bindings>=13.0.0,<14.0.0",
]
cu12 = [
  "cuda-stf[minimal-cu12]",
  "numba>=0.60.0",
  "numba-cuda[cu12]>=0.23.0,!=0.27.*,!=0.28.*,!=0.29.*,!=0.30.0",
]
cu13 = [
  "cuda-stf[minimal-cu13]",
  "numba>=0.60.0",
  "numba-cuda[cu13]>=0.23.0,!=0.27.*,!=0.28.*,!=0.29.*,!=0.30.0",
]
sysctk12 = [
  "cuda-stf[minimal-sysctk12]",
  "numba>=0.60.0",
  "numba-cuda[cu12]>=0.23.0,!=0.27.*,!=0.28.*,!=0.29.*,!=0.30.0",
]
sysctk13 = [
  "cuda-stf[minimal-sysctk13]",
  "numba>=0.60.0",
  "numba-cuda[cu13]>=0.23.0,!=0.27.*,!=0.28.*,!=0.29.*,!=0.30.0",
]
# The tests exercise cuda.compute and C++ header discovery from cuda-cccl.
test-cu12 = [
  # an undocumented way to inherit the dependencies of the cu12 extra.
  # GH pypa #11296
  "cuda-stf[cu12]",
  "cuda-cccl",
  "pytest",
  "pytest-xdist",
  "cupy-cuda12x",
]
test-cu13 = ["cuda-stf[cu13]", "cuda-cccl", "pytest", "pytest-xdist", "cupy-cuda13x"]
test-sysctk12 = [
  "cuda-stf[sysctk12]",
  "cuda-cccl",
  "pytest",
  "pytest-xdist",
  "cupy-cuda12x",
]
test-sysctk13 = [
  "cuda-stf[sysctk13]",
  "cuda-cccl",
  "pytest",
  "pytest-xdist",
  "cupy-cuda13x",
]

[project.urls]
Homepage = "https://github.com/NVIDIA/cccl"
Repository = "https://github.com/NVIDIA/cccl"
Documentation = "https://nvidia.github.io/cccl"
Issues = "https://github.com/NVIDIA/cccl/issues"

[tool.scikit-build]
minimum-version = "build-system.requires"
build-dir = "build/{wheel_tag}"

[tool.scikit-build.cmake]
version = ">=3.30"
args = []
build-type = "Release"
source-dir = "."

[tool.scikit-build.ninja]
version = ">=1.11"
make-fallback = true

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.setuptools_scm"

[tool.setuptools_scm]
root = "../.."
git_describe_command = ["git", "describe", "--tags", "--match", "v[0-9]*"]
fallback_version = "0.0.0"

# Ship only the STF subtree. `cuda` and `cuda.stf` are namespace packages
# (potentially shared with other cuda-* distributions), so this package must
# not own their parent __init__.py files. The cu12/cu13 extension directories
# and the STF include tree (cuda/stf/_experimental/include) are installed by
# CMake, not listed here.
[tool.scikit-build.wheel.packages]
"cuda/stf/_experimental" = "cuda/stf/_experimental"
"cuda/stf/_experimental/interop" = "cuda/stf/_experimental/interop"

[tool.mypy]
cache_dir = "../../.cache/mypy"
python_version = "3.10"

[[tool.mypy.overrides]]
module = [
  "numba.*",
  "llvmlite.*",
  "cuda.cccl.*",
  "cuda.compute.*",
  "cuda.bindings.*",
  "cuda.core.*",
  "cuda.pathfinder.*",
]
ignore_missing_imports = true
follow_imports = "skip"

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.isort]
known-first-party = [
  "cuda.stf",
  "cuda.stf._experimental",
]

[tool.pytest.ini_options]
markers = [
  "large: tests requiring large device memory allocations",
]
