# Secret Scan (TruffleHog) — server-side companion to the
# `secret-scan-trufflehog` pre-commit hook in `.pre-commit-config.yaml`.
#
# Calls the central reusable workflow published by NVIDIA/security-workflows
# so the scan binary, defaults, and policy stay aligned across NVIDIA OSS
# repos. Pre-commit (advisory, local) + this CI scan (enforcement, server-
# side) are complementary — a `git commit --no-verify` bypass is caught
# here on PR open / push to main.
#
# TODO: pin to a 40-char commit SHA once `NVIDIA/security-workflows`
# tags `v0.1.0`. Tracking on `@main` during the pilot phase to avoid
# fan-out SHA-bumps across every consumer × every scan while the
# upstream is still consolidating. Pairs with the matching `rev: main`
# TODO on the pre-commit hook in `.pre-commit-config.yaml`.

name: Secret Scan (TruffleHog)

on:
  push:
    branches:
      - "main"
      # copy-pr-bot mirror branches; matches the trigger model used by
      # ci-workflow-pull-request.yml so PR scans run in the same trust
      # context as the rest of CI.
      - "pull-request/[0-9]+"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-on-${{ github.event_name }}-from-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    # Pilot phase: track @main (see TODO in the header). At GA, swap the
    # `uses:` line below to a 40-char commit SHA matching the released
    # `v0.1.0` tag — branch refs become non-acceptable per the
    # security-workflows pin policy. Example shape (the SHA below is the
    # first reusable-workflow commit and is shown only as a literal
    # template — verify the released tag's SHA at swap time):
    #
    #   uses: NVIDIA/security-workflows/.github/workflows/secret-scan-trufflehog.yml@ab5558d84285152b16c190f57b79789e452b3f2b  # v0.1.0
    uses: NVIDIA/security-workflows/.github/workflows/secret-scan-trufflehog.yml@main
    with:
      # NV self-hosted CPU runner on NVIDIA/cccl; GitHub-hosted fallback
      # so the workflow still runs on contributor forks where nv-gha-runners
      # labels do not resolve. Mirrors the pattern in build-rapids.yml /
      # docs-deploy.yml.
      runs-on: ${{ github.repository == 'NVIDIA/cccl' && 'linux-amd64-cpu4' || 'ubuntu-latest' }}
      # Defaults inherited from the reusable workflow:
      #   extra-args: --results=verified   (matches the pre-commit hook)
      #   fail-on-findings: true           (fail-closed per AGENTS.md rule #8)
