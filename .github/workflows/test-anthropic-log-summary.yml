name: Test Anthropic API Smoke

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

on:
  push:
    branches:
      - "pull-request/[0-9]+"

permissions:
  contents: read

jobs:
  anthropic-smoke:
    name: Anthropic API smoke
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_MODEL: claude-sonnet-4-6
      SMOKE_MARKER: CCCL_ANTHROPIC_SMOKE_TEST_OK
    steps:
      - name: Ask Anthropic for a fixed marker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const {
            ANTHROPIC_API_KEY,
            ANTHROPIC_MODEL,
            GITHUB_STEP_SUMMARY,
            SMOKE_MARKER,
          } = process.env;

          async function main() {
            if (!ANTHROPIC_API_KEY) {
              throw new Error("ANTHROPIC_API_KEY secret is not set.");
            }

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "anthropic-version": "2023-06-01",
                "x-api-key": ANTHROPIC_API_KEY,
              },
              body: JSON.stringify({
                model: ANTHROPIC_MODEL,
                max_tokens: 32,
                messages: [
                  {
                    role: "user",
                    content: `Reply with exactly this marker and no other text: ${SMOKE_MARKER}`,
                  },
                ],
              }),
            });

            const raw = await response.text();
            if (!response.ok) {
              console.error(raw);
              throw new Error(`Anthropic Messages API failed with HTTP ${response.status}.`);
            }

            const data = JSON.parse(raw);
            const outputText = (data.content || [])
              .map((content) => content.text || "")
              .filter(Boolean)
              .join("\n")
              .trim();

            console.log(outputText);

            if (!outputText.includes(SMOKE_MARKER)) {
              throw new Error(`Anthropic response did not include ${SMOKE_MARKER}.`);
            }

            if (GITHUB_STEP_SUMMARY) {
              fs.appendFileSync(
                GITHUB_STEP_SUMMARY,
                [
                  "## Anthropic API Smoke Test",
                  "",
                  `Model: \`${ANTHROPIC_MODEL}\``,
                  `Marker found: \`${SMOKE_MARKER}\``,
                  "",
                ].join("\n")
              );
            }
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
