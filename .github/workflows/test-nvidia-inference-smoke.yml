name: Test NVIDIA Inference Hub Agent

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

on:
  workflow_dispatch:
  push:
    branches:
      - "pull-request/[0-9]+"

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  intentional-failure-one:
    name: Intentional failure one
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Building cub.test.example for compute_999"
          echo "nvcc fatal: Unsupported gpu architecture 'compute_999'"
          exit 1

  intentional-failure-two:
    name: Intentional failure two
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Building thrust.test.example for compute_999"
          echo "nvcc fatal: Unsupported gpu architecture 'compute_999'"
          exit 1

  summarize:
    name: Ask an agent to investigate the failures
    if: ${{ always() }}
    needs:
      - intentional-failure-one
      - intentional-failure-two
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out CCCL
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Fetch pull request merge base
        id: pull-request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^pull-request/([0-9]+)$ ]]; then
            pr_number="${BASH_REMATCH[1]}"
          else
            echo "Expected a pull-request/<number> branch, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          mapfile -t pr_shas < <(gh api \
            "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" \
            --jq '.base.sha, .head.sha')
          target_sha="${pr_shas[0]}"
          head_sha="${pr_shas[1]}"

          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]] \
            || [[ "${head_sha}" != "${GITHUB_SHA}" ]]; then
            echo "Could not match the copied branch to pull request ${pr_number}" >&2
            exit 1
          fi

          base_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/compare/${target_sha}...${head_sha}" \
            --jq '.merge_base_commit.sha')"
          if [[ ! "${base_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve the pull request merge base" >&2
            exit 1
          fi

          git fetch --no-tags --depth=1 origin "${base_sha}"
          echo "base_sha=${base_sha}" >> "${GITHUB_OUTPUT}"

      - name: Configure agent permissions
        run: |
          mkdir -p "${RUNNER_TEMP}/codex-home"
          cp .github/codex/ci-triage.toml "${RUNNER_TEMP}/codex-home/config.toml"

      - name: Investigate the workflow run
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BASE_SHA: ${{ steps.pull-request.outputs.base_sha }}
        with:
          openai-api-key: ${{ secrets.NVINFERENCE_API_KEY }}
          responses-api-endpoint: https://inference-api.nvidia.com/v1/responses
          codex-version: 0.144.5
          codex-home: ${{ runner.temp }}/codex-home
          permission-profile: ci_triage
          allow-bot-users: "copy-pr-bot[bot]"
          model: openai/openai/gpt-5.5
          codex-args: --ignore-rules
          output-file: ${{ runner.temp }}/agent-summary.md
          prompt-file: .github/codex/ci-triage-prompt.md

      - name: Publish the failure analysis
        run: |
          grep -q 'compute_999' "${RUNNER_TEMP}/agent-summary.md"
          grep -q '^Log retrieval: succeeded' "${RUNNER_TEMP}/agent-summary.md"
          grep -q 'Repository inspection:' "${RUNNER_TEMP}/agent-summary.md"

          {
            echo "## NVIDIA Inference Hub failure analysis"
            echo
            cat "${RUNNER_TEMP}/agent-summary.md"
          } | tee -a "${GITHUB_STEP_SUMMARY}"
