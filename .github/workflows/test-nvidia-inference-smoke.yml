name: Test NVIDIA Inference Hub Log Summary

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

on:
  workflow_dispatch:
  push:
    branches:
      - "pull-request/[0-9]+"

permissions:
  actions: read
  contents: read

jobs:
  intentional-failure:
    name: Intentional failure
    runs-on: ubuntu-latest
    steps:
      - name: Fail on purpose
        run: |
          echo "This job fails on purpose to test NVIDIA Inference Hub log summarization."
          echo "CCCL_INFERENCE_SMOKE_FAILURE: pretend a CUDA compile failed while building cub.test.example."
          echo "::error file=ci/smoke/inference_hub,line=1::Intentional smoke-test failure for log summarization."
          exit 42

  summarize-log:
    name: Summarize failed log with NVIDIA Inference Hub
    runs-on: ubuntu-latest
    needs: intentional-failure
    if: ${{ always() && needs.intentional-failure.result == 'failure' }}
    env:
      INFERENCE_BASE_URL: https://inference-api.nvidia.com/v1
      INFERENCE_MODEL: ${{ vars.INFERENCE_MODEL || 'nvidia/meta/llama-3.3-70b-instruct' }}
    steps:
      - name: Fetch failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Give GitHub a moment to make the failed job log available.
          sleep 10
          gh run view "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --log-failed \
            > failed-job.log
          cat failed-job.log

      - name: Summarize failed job log
        env:
          NVINFERENCE_API_KEY: ${{ secrets.NVINFERENCE_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const {
            INFERENCE_BASE_URL,
            INFERENCE_MODEL,
            NVINFERENCE_API_KEY,
          } = process.env;

          if (!NVINFERENCE_API_KEY) {
            throw new Error("NVINFERENCE_API_KEY secret is not set.");
          }

          const baseUrl = (INFERENCE_BASE_URL || "https://inference-api.nvidia.com/v1").replace(/\/+$/, "");
          const model = INFERENCE_MODEL || "nvidia/meta/llama-3.3-70b-instruct";
          const log = fs.readFileSync("failed-job.log", "utf8").slice(-60000);

          async function main() {
            const response = await fetch(`${baseUrl}/chat/completions`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${NVINFERENCE_API_KEY}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                model,
                messages: [
                  {
                    role: "system",
                    content: "You summarize GitHub Actions failures tersely and accurately.",
                  },
                  {
                    role: "user",
                    content: [
                      "Summarize this failed GitHub Actions log.",
                      "Include the root cause, failing step, and next action.",
                      "",
                      "```text",
                      log,
                      "```",
                    ].join("\n"),
                  },
                ],
                temperature: 0.2,
                max_tokens: 600,
                stream: false,
              }),
            });

            const raw = await response.text();
            if (!response.ok) {
              console.error(raw);
              throw new Error(`Inference Hub failed with HTTP ${response.status}.`);
            }

            const data = JSON.parse(raw);
            const summary = (data.choices || [])
              .map((choice) => choice.message?.content || choice.text || "")
              .filter(Boolean)
              .join("\n")
              .trim();

            if (!summary) {
              throw new Error("Inference Hub returned an empty summary.");
            }

            console.log("");
            console.log("===== NVIDIA Inference Hub Summary =====");
            console.log(`Model: ${model}`);
            console.log("");
            console.log(summary);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
