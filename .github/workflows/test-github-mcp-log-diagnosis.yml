name: Test GitHub MCP Log Diagnosis

on:
  workflow_dispatch:
    inputs:
      model:
        description: "OpenAI model to use for the smoke test."
        required: false
        default: "gpt-5-mini"

permissions:
  actions: read
  contents: read

jobs:
  intentional-failure:
    name: Intentional failure
    runs-on: ubuntu-latest
    steps:
      - name: Emit a recognizable failure
        run: |
          echo "CCCL_GITHUB_MCP_SMOKE_TEST_MARKER: intentional failure for log diagnosis"
          exit 42

  diagnose:
    name: Diagnose via GitHub MCP
    needs: intentional-failure
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Ask OpenAI to read failed job logs via GitHub MCP
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.model }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          async function main() {
            const {
              GITHUB_TOKEN,
              OPENAI_API_KEY,
              OPENAI_MODEL,
              REPOSITORY,
              RUN_ID,
              GITHUB_STEP_SUMMARY,
            } = process.env;

            if (!OPENAI_API_KEY) {
              throw new Error("OPENAI_API_KEY secret is not set.");
            }
            if (!GITHUB_TOKEN) {
              throw new Error("GITHUB_TOKEN is not available.");
            }

            const body = {
              model: OPENAI_MODEL || "gpt-5-mini",
              instructions: [
                "You are testing whether GitHub MCP can read GitHub Actions logs from this workflow run.",
                "Use GitHub MCP actions tools to inspect the failed jobs for the requested run.",
                "Return compact JSON only.",
              ].join("\n"),
              tools: [
                {
                  type: "mcp",
                  server_label: "github",
                  server_url: "https://api.githubcopilot.com/mcp/x/actions/readonly",
                  headers: {
                    Authorization: `Bearer ${GITHUB_TOKEN}`,
                  },
                  allowed_tools: ["actions_list", "actions_get", "get_job_logs"],
                  require_approval: "never",
                },
              ],
              input: [
                `Repository: ${REPOSITORY}`,
                `Workflow run ID: ${RUN_ID}`,
                "",
                "Fetch the failed job logs for this run. Confirm whether the logs contain",
                "`CCCL_GITHUB_MCP_SMOKE_TEST_MARKER`, and summarize the intentional failure.",
                "",
                "Return JSON with keys: mcp_log_access, marker_found, failed_jobs, summary, errors.",
              ].join("\n"),
            };

            const response = await fetch("https://api.openai.com/v1/responses", {
              method: "POST",
              headers: {
                Authorization: `Bearer ${OPENAI_API_KEY}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify(body),
            });

            const raw = await response.text();
            if (!response.ok) {
              console.error(raw);
              throw new Error(`OpenAI Responses API failed with HTTP ${response.status}.`);
            }

            const data = JSON.parse(raw);
            const outputText =
              data.output_text ||
              (data.output || [])
                .flatMap((item) => item.content || [])
                .map((content) => content.text || "")
                .filter(Boolean)
                .join("\n");

            console.log(outputText);

            if (GITHUB_STEP_SUMMARY) {
              const summary = [
                "## GitHub MCP Log Diagnosis Smoke Test",
                "",
                "```json",
                outputText,
                "```",
                "",
              ].join("\n");
              fs.appendFileSync(GITHUB_STEP_SUMMARY, summary);
            }
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
