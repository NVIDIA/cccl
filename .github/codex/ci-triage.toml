[features]
network_proxy = true

[permissions.ci_triage.filesystem]
":minimal" = "read"
# codex-action installs the CLI under the hosted Node toolcache.
"/opt/hostedtoolcache/node" = "read"

[permissions.ci_triage.filesystem.":workspace_roots"]
"." = "read"

[permissions.ci_triage.network]
enabled = true
# GitHub-hosted runners can prevent the proxy's DNS safety probe from resolving
# public hosts. Keep access domain-scoped, but do not treat that DNS failure as
# evidence that an allowlisted GitHub endpoint is private.
allow_local_binding = true
# Do not inherit a runner-level proxy when opening the allowlisted GitHub
# connections; the nested proxy tunnel closes these requests with EOF.
allow_upstream_proxy = false

[permissions.ci_triage.network.domains]
"api.github.com" = "allow"
"results-receiver.actions.githubusercontent.com" = "allow"
"*.blob.core.windows.net" = "allow"

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
include_only = [
  "HOME",
  "PATH",
  "GH_TOKEN",
  "GITHUB_REPOSITORY",
  "GITHUB_RUN_ID",
  "GITHUB_WORKSPACE",
]
