[features]
network_proxy = true

[permissions.ci_triage.filesystem]
":minimal" = "read"
":slash_tmp" = "write"
":tmpdir" = "write"
# codex-action installs the CLI under the hosted Node toolcache.
"/opt/hostedtoolcache/node" = "read"

[permissions.ci_triage.filesystem.":workspace_roots"]
"." = "read"

[permissions.ci_triage.network]
enabled = true
mode = "full"
allow_local_binding = true
allow_upstream_proxy = false

[permissions.ci_triage.network.domains]
"api.github.com" = "allow"
"*.blob.core.windows.net" = "allow"

[permissions.ci_triage.network.mitm.actions.github_read]
[[permissions.ci_triage.network.mitm.actions.github_read.inject_request_headers]]
name = "authorization"
secret_env_var = "GH_TOKEN"
prefix = "Bearer "

[permissions.ci_triage.network.mitm.hooks.workflow_jobs]
host = "api.github.com"
methods = ["GET"]
path_prefixes = ["/repos/NVIDIA/cccl/actions/runs/"]
action = ["github_read"]

[permissions.ci_triage.network.mitm.hooks.job_logs]
host = "api.github.com"
methods = ["GET"]
path_prefixes = ["/repos/NVIDIA/cccl/actions/jobs/"]
action = ["github_read"]

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
include_only = [
  "HOME",
  "PATH",
  "GITHUB_REPOSITORY",
  "GITHUB_RUN_ID",
  "GITHUB_WORKSPACE",
]
